# 18.5Ga

- type: entity
  id: CrescentCartridge_18.5Ga
  name: Cartridge (18.5Ga)
  parent: CrescentBaseCartridge
  abstract: False
  components:
  - type: Tag
    tags:
    - ShellShotgun
    - Cartridge
    - CrescentCartridge_18.5Ga
  - type: CartridgeAmmo
    proto: CrescentBullet_18.5Ga
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Casings/18.5Ga.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]

- type: entity
  id: CrescentBullet_18.5Ga
  name: bullet (18.5Ga)
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 1000 # i just hit the juckport
    harmorPenetration: 30
    stoppingPower: 4

- type: entity
  id: Crescent18.5gPelletShotgunSpread
  categories: [ HideSpawnMenu ]
  parent: CrescentBullet_18.5Ga
  components:
  - type: ProjectileSpread
    proto: Crescent18.5gPelletShotgun
    count: 5
    spread: 12.5

- type: entity
  abstract: False
  parent: CrescentBaseAmmoBox
  id: CrescentAmmoBox_18.5Ga
  name: ammunition box (18.5Ga)
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_18.5Ga
    proto: CrescentCartridge_18.5Ga
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Boxes/Shotgun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false

- type: entity
  id: CrescentMagazine_18.5Ga
  name: "10-round magazine (18.5Ga)"
  parent: CrescentBaseMagazine
  abstract: False
  components:
  - type: Tag
    tags:
      - Magazine_18.5Ga
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_18.5Ga
    proto: CrescentCartridge_18.5Ga
    capacity: 5
  - type: Sprite
    sprite: _Crescent/Objects/Weapons/Ammunition/New_Ammo/Magazine/18.5Ga_Mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false

